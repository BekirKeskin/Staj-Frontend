<div class="todos-page">
  
  <section class="form-section">
    <app-todo-form 
      [editingTodo]="todoStore.editingTodo()" 
      (todoAdded)="addTodo($event)" 
      (todoUpdated)="updateTodo($event)" 
      [loading]="todoService.loading()">
    </app-todo-form>
  </section>

  <section class="filter-section">
    <button (click)="changeFilter('all')">Tümü</button>

    <button (click)="changeFilter('active')">Aktif</button>

    <button (click)="changeFilter('completed')">Tamamlanan</button>
  </section>

  <section>
    <app-todo-list [todolar]="todoStore.filteredList()" (checkRequested)="toggleTodo($event.id)"
      (deleteRequested)="deleteTodo($event.id)" (editRequested)="editTodo($event)">
    </app-todo-list> 
  </section>

  <app-modal 
    [visible]="modalVisible()"
    message="Todo silinsin mi?"
    (cancelled)="closeModal()"
    (confirmed)="confirmDelete()"
  >

  </app-modal>

</div>
