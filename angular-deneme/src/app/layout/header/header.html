<div class="header-container">
    <div class="left">
        <h1>ToDo APP Advanced</h1>
        <p>
            Todo App'e hoşgeldiniz, bu uygulamada planlarınızı yapabilir, listeleyebilir ve takip edebilirsiniz. 
            Lütfen hiçbir alanı boş bırakmayınız!
        </p>
    </div>
    <div class="right">

        @if(authStore.user();as user){
            <span>
                Hoşgeldin, {{user.name}}
            </span>
        }

        <button (click)="themeToggle()">
            @if (isDark){
                ☀
            } @else {
                🌙
            }
        </button>

        <app-button
            type="button"
            text="Çıkış"
            variant="danger"
            (clicked)="logout()">
        </app-button>

    </div>
</div>
